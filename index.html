<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Training Track — ACC Creative Media</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: #36454F;
      color: #111;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .tt-wrap {
      max-width: 860px;
      margin: 0 auto;
      background: #fff;
      border-radius: 12px;
      border: 1px solid #e0e0e0;
      padding: 2rem 2.5rem;
    }

    /* Header */
    .tt-header {
      text-align: center;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-top: 3px solid #111;
      border-bottom: 3px solid #111;
    }
    .tt-header h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .tt-header .subtitle {
      font-size: 13px;
      color: #666;
      margin-top: 4px;
    }

    /* Controls */
    .controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      margin-bottom: 1.25rem;
    }
    .controls label {
      font-size: 13px;
      color: #555;
      white-space: nowrap;
    }
    .controls input[type="text"] {
      flex: 1;
      min-width: 160px;
      font-size: 14px;
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: #fff;
      color: #111;
      outline: none;
      transition: border-color 0.15s;
    }
    .controls input[type="text"]:focus { border-color: #888; }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 1.75rem;
    }

    button {
      padding: 8px 16px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: transparent;
      color: #111;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
      font-family: inherit;
    }
    button:hover { background: #f0f0ee; border-color: #aaa; }
    button.btn-primary {
      background: #111;
      color: #fff;
      border-color: #111;
    }
    button.btn-primary:hover { background: #333; border-color: #333; }

    /* Skills grid */
    .skills-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 2rem;
    }
    @media (max-width: 600px) {
      .skills-grid { grid-template-columns: repeat(2, 1fr); }
    }

    .skill-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 7px;
      cursor: pointer;
      user-select: none;
      padding: 8px 4px;
      border-radius: 8px;
      transition: background 0.12s;
    }
    .skill-card:hover { background: #f5f5f3; }
    .skill-card:hover svg { transform: scale(1.08); }
    .skill-card svg { transition: transform 0.15s; display: block; }

    .skill-name {
      font-size: 11px;
      font-weight: 600;
      text-align: center;
      line-height: 1.35;
      max-width: 90px;
    }
    .skill-level-label {
      font-size: 10px;
      color: #777;
      text-align: center;
      line-height: 1.3;
    }

    /* Legend */
    .legend-box {
      border: 2px solid #111;
      border-radius: 8px;
      padding: 1rem 1.25rem;
      margin-bottom: 1rem;
    }
    .legend-box h2 {
      font-size: 15px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 3px;
    }
    .legend-box p {
      font-size: 11px;
      color: #666;
      font-style: italic;
      margin-bottom: 14px;
    }
    .legend-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }
    .legend-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .legend-label {
      font-size: 11px;
      font-weight: 600;
      text-align: center;
      line-height: 1.35;
    }

    /* Modal */
    .modal-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .modal-bg.open { display: flex; }
    .modal {
      background: #fff;
      border-radius: 12px;
      border: 1px solid #ddd;
      padding: 1.5rem;
      min-width: 300px;
      max-width: 400px;
      width: 92%;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal h3 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 14px;
    }
    .modal input[type="text"] {
      width: 100%;
      font-size: 14px;
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: #fff;
      color: #111;
      margin-bottom: 10px;
      font-family: inherit;
      outline: none;
    }
    .modal input[type="text"]:focus { border-color: #888; }

    .skill-list-item, .volunteer-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 0;
      border-bottom: 1px solid #eee;
      font-size: 13px;
    }
    .del-btn {
      background: none;
      border: none;
      color: #aaa;
      font-size: 18px;
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
      border-radius: 4px;
    }
    .del-btn:hover { color: #c0392b; background: #fdf0ee; }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 14px;
    }

    .empty-msg {
      font-size: 13px;
      color: #999;
      padding: 8px 0;
    }

    /* Print styles */
    @media print {
      body { background: #fff; padding: 0; }
      .tt-wrap { border: none; border-radius: 0; padding: 24px 32px; box-shadow: none; }
      .no-print { display: none !important; }
      .modal-bg { display: none !important; }
      .skill-card { cursor: default; }
      .skill-card:hover { background: transparent; }
    }
  </style>
</head>
<body>

<div class="tt-wrap">
  <div class="tt-header">
     <img src="logo.png" alt="Church Logo" style="height: 60px; margin-bottom: 10px;" />
    <h1>Training Track</h1>
    <div class="subtitle">ACC Creative Media — Click a skill to cycle through proficiency levels</div>
  </div>

  <div class="controls no-print">
    <label for="vol-name">Volunteer name:</label>
    <input type="text" id="vol-name" placeholder="Enter name..." />
    <button onclick="openVolunteers()">Saved volunteers</button>
    <button onclick="openSkillEditor()">Edit skills</button>
  </div>

  <div class="actions no-print">
    <button class="btn-primary" onclick="printTrack()">Print / Export PDF</button>
    <button onclick="saveVolunteer()">Save volunteer</button>
    <button onclick="resetAll()">Reset levels</button>
  </div>

  <div class="skills-grid" id="skills-grid"></div>

  <div class="legend-box">
    <h2>Knowledge Base</h2>
    <p>*Pertaining to Creative Media, Keynote Production, and Sermon Support.</p>
    <div class="legend-grid" id="legend-grid"></div>
  </div>
</div>

<!-- Skill editor modal -->
<div class="modal-bg" id="skill-modal">
  <div class="modal">
    <h3>Edit skills</h3>
    <div style="display:flex;gap:8px;margin-bottom:10px;">
      <input type="text" id="new-skill-input" placeholder="New skill name..."
        style="margin:0;flex:1;" onkeydown="if(event.key==='Enter')addSkill()" />
      <button class="btn-primary" onclick="addSkill()">Add</button>
    </div>
    <div id="skill-list" style="max-height:280px;overflow-y:auto;"></div>
    <div class="modal-footer">
      <button class="btn-primary" onclick="closeSkillEditor()">Done</button>
    </div>
  </div>
</div>

<!-- Volunteers modal -->
<div class="modal-bg" id="vol-modal">
  <div class="modal">
    <h3>Saved volunteers</h3>
    <div id="vol-list" style="max-height:320px;overflow-y:auto;"></div>
    <div class="modal-footer">
      <button class="btn-primary" onclick="closeVolunteers()">Close</button>
    </div>
  </div>
</div>

<script>
  /* ── Level definitions ── */
  const LEVELS = [
    { label: "No training",                   colors: ["#fff","#fff","#fff","#fff"] },
    { label: "In training",                   colors: ["#e74c3c","#fff","#fff","#fff"] },
    { label: "Can complete with supervision", colors: ["#f1c40f","#f1c40f","#fff","#fff"] },
    { label: "Can complete with check in",    colors: ["#aaee44","#fff","#aaee44","#fff"] },
    { label: "Can complete unsupervised",     colors: ["#1a8a2e","#1a8a2e","#1a8a2e","#fff"] },
    { label: "Can train others",              colors: ["#3498db","#3498db","#3498db","#3498db"] }
  ];

  const DEFAULT_SKILLS = [
    "Keynote Production From Existing", "Keynote Backups", "Brett's Notes", "Keynote Production From Scratch",
    "Main Service Flow", "Remote System", "ProPresenter 7", "Resolume",
    "Post Production", "Graphic Design", "Video Editing", "Video System",
    "Keynote Collaboration", "Prophecy Update Artwork (From Scratch)",
    "Guest Speaker (Keynote and Notes)", "Owl System"
  ];

  /* ── State ── */
  let skills = [...DEFAULT_SKILLS];
  let levels = {};
  skills.forEach(s => levels[s] = 0);

  /* ── localStorage persistence ── */
  function saveState() {
    try {
      localStorage.setItem('tt_skills', JSON.stringify(skills));
      localStorage.setItem('tt_levels', JSON.stringify(levels));
    } catch(e) {}
  }

  function loadState() {
    try {
      const sk = localStorage.getItem('tt_skills');
      if (sk) skills = JSON.parse(sk);
    } catch(e) {}
    try {
      const lv = localStorage.getItem('tt_levels');
      if (lv) levels = JSON.parse(lv);
    } catch(e) {}
    skills.forEach(s => { if (levels[s] === undefined) levels[s] = 0; });
  }

  /* ── SVG grid icon ── */
  function makeGridIcon(colorArr, size = 56) {
    const gap = 2, pad = 2;
    const q = Math.floor((size - pad * 2 - gap) / 2);
    return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">
      <rect x="0" y="0" width="${size}" height="${size}" rx="2" fill="none" stroke="#111" stroke-width="2"/>
      <rect x="${pad}" y="${pad}" width="${q}" height="${q}" rx="1" fill="${colorArr[0]}"/>
      <rect x="${pad+q+gap}" y="${pad}" width="${q}" height="${q}" rx="1" fill="${colorArr[1]}"/>
      <rect x="${pad}" y="${pad+q+gap}" width="${q}" height="${q}" rx="1" fill="${colorArr[2]}"/>
      <rect x="${pad+q+gap}" y="${pad+q+gap}" width="${q}" height="${q}" rx="1" fill="${colorArr[3]}"/>
    </svg>`;
  }

  /* ── Render ── */
  function render() {
    const grid = document.getElementById('skills-grid');
    grid.innerHTML = '';
    skills.forEach(skill => {
      const lvl = levels[skill] || 0;
      const card = document.createElement('div');
      card.className = 'skill-card';
      card.innerHTML = `
        <div>${makeGridIcon(LEVELS[lvl].colors)}</div>
        <div class="skill-name">${skill}</div>
        <div class="skill-level-label">${LEVELS[lvl].label}</div>
      `;
      card.addEventListener('click', () => {
        levels[skill] = (levels[skill] + 1) % LEVELS.length;
        saveState();
        render();
      });
      grid.appendChild(card);
    });

    document.getElementById('legend-grid').innerHTML = LEVELS.map(l => `
      <div class="legend-item">
        <div>${makeGridIcon(l.colors, 48)}</div>
        <div class="legend-label">${l.label}</div>
      </div>
    `).join('');
  }

  /* ── Actions ── */
  function resetAll() {
    if (!confirm('Reset all skill levels to "No training"?')) return;
    skills.forEach(s => levels[s] = 0);
    saveState();
    render();
  }

  /* ── Print / PDF ── */
  function printTrack() {
    const name = document.getElementById('vol-name').value.trim() || 'Volunteer';
    const gridHTML = skills.map(skill => {
      const lvl = levels[skill] || 0;
      return `<div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
        ${makeGridIcon(LEVELS[lvl].colors, 52)}
        <div style="font-size:10px;font-weight:600;text-align:center;max-width:84px;line-height:1.3;">${skill}</div>
      </div>`;
    }).join('');
    const legHTML = LEVELS.map(l => `
      <div style="display:flex;flex-direction:column;align-items:center;gap:5px;">
        ${makeGridIcon(l.colors, 44)}
        <div style="font-size:10px;font-weight:600;text-align:center;line-height:1.3;">${l.label}</div>
      </div>`).join('');
    const win = window.open('', '_blank', 'width=820,height=720');
    win.document.write(`<!DOCTYPE html><html><head><title>Training Track — ${name}</title>
    <style>
      body { font-family: Arial, sans-serif; padding: 32px 40px; max-width: 740px; margin: 0 auto; }
      h1 { text-align:center; font-size:24px; letter-spacing:.12em; text-transform:uppercase;
           border-top:3px solid #000; border-bottom:3px solid #000; padding:8px 0; margin-bottom:6px; }
      .vol { text-align:center; font-size:13px; color:#555; margin-bottom:26px; }
      .sg { display:grid; grid-template-columns:repeat(4,1fr); gap:18px; margin-bottom:26px; }
      .kb { border:2px solid #000; border-radius:6px; padding:14px 18px; }
      .kb h2 { font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; margin:0 0 3px; }
      .kb p { font-size:10px; color:#777; font-style:italic; margin:0 0 12px; }
      .lg { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
      @media print { body { padding:16px 20px; } }
    </style></head><body>
    <h1>Training Track</h1>
    <div class="vol">${name}</div>
    <div class="sg">${gridHTML}</div>
    <div class="kb">
      <h2>Knowledge Base</h2>
      <p>*Pertaining to Creative Media, Keynote Production, and Sermon Support.</p>
      <div class="lg">${legHTML}</div>
    </div>
    <script>window.onload = () => { window.print(); }<\/script>
    </body></html>`);
    win.document.close();
  }

  /* ── Save / load volunteers ── */
  function saveVolunteer() {
    const name = document.getElementById('vol-name').value.trim();
    if (!name) { alert('Enter a volunteer name first.'); return; }
    try {
      const volunteers = JSON.parse(localStorage.getItem('tt_volunteers') || '{}');
      volunteers[name] = { name, levels: { ...levels } };
      localStorage.setItem('tt_volunteers', JSON.stringify(volunteers));
      alert(`Saved "${name}"!`);
    } catch(e) { alert('Could not save volunteer.'); }
  }

  function openVolunteers() {
    const list = document.getElementById('vol-list');
    try {
      const volunteers = JSON.parse(localStorage.getItem('tt_volunteers') || '{}');
      const names = Object.keys(volunteers);
      if (names.length === 0) {
        list.innerHTML = '<div class="empty-msg">No saved volunteers yet.</div>';
      } else {
        list.innerHTML = names.map(n => `
          <div class="volunteer-row">
            <span>${n}</span>
            <div style="display:flex;gap:8px;">
              <button style="padding:4px 10px;font-size:12px;" onclick="loadVolunteer('${n.replace(/'/g,"\\'")}')">Load</button>
              <button class="del-btn" onclick="deleteVolunteer('${n.replace(/'/g,"\\'")}')">×</button>
            </div>
          </div>`).join('');
      }
    } catch(e) {
      list.innerHTML = '<div class="empty-msg">Could not load volunteers.</div>';
    }
    document.getElementById('vol-modal').classList.add('open');
  }

  function loadVolunteer(name) {
    try {
      const volunteers = JSON.parse(localStorage.getItem('tt_volunteers') || '{}');
      const v = volunteers[name];
      if (!v) return;
      document.getElementById('vol-name').value = v.name;
      levels = {};
      skills.forEach(s => levels[s] = 0);
      Object.assign(levels, v.levels);
      saveState();
      render();
      closeVolunteers();
    } catch(e) { alert('Could not load volunteer.'); }
  }

  function deleteVolunteer(name) {
    if (!confirm(`Delete "${name}"?`)) return;
    try {
      const volunteers = JSON.parse(localStorage.getItem('tt_volunteers') || '{}');
      delete volunteers[name];
      localStorage.setItem('tt_volunteers', JSON.stringify(volunteers));
      openVolunteers();
    } catch(e) {}
  }

  function closeVolunteers() {
    document.getElementById('vol-modal').classList.remove('open');
  }

  /* ── Skill editor ── */
  function openSkillEditor() {
    document.getElementById('skill-list').innerHTML = skills.map((s, i) => `
      <div class="skill-list-item">
        <span>${s}</span>
        <button class="del-btn" onclick="removeSkill(${i})">×</button>
      </div>`).join('');
    document.getElementById('skill-modal').classList.add('open');
  }

  function addSkill() {
    const inp = document.getElementById('new-skill-input');
    const val = inp.value.trim();
    if (!val) return;
    skills.push(val);
    levels[val] = 0;
    inp.value = '';
    saveState();
    render();
    openSkillEditor();
  }

  function removeSkill(i) {
    const s = skills[i];
    skills.splice(i, 1);
    delete levels[s];
    saveState();
    render();
    openSkillEditor();
  }

  function closeSkillEditor() {
    document.getElementById('skill-modal').classList.remove('open');
  }

  /* ── Init ── */
  loadState();
  render();
</script>
</body>
</html>
